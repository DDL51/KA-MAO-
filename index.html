/* ==========================================================================
   RODAPÉ FIXO MESTRE - ENGENHARIA DE ESTEIRA HOLOGRÁFICA (LIMPO E CORRIGIDO)
   ========================================================================== */

/* CONTAINER PRINCIPAL DO RODAPÉ */
.rodape-fixo {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    max-width: 500px;
    background-color: #1a252f; /* Substituído o vermelho por um grafite premium */
    padding: 8px 0;           /* Zera o padding lateral para a esteira sangrar as bordas */
    box-sizing: border-box;
    z-index: 1000;
    border-top: 3px solid #f1c40f; /* Detalhe dourado na borda superior */
}

/* 🔥 A ESTEIRA ROLANTE HORIZONTAL */
.controles-rodape {
    display: flex;
    flex-wrap: nowrap;          /* Proíbe quebrar linha */
    overflow-x: auto;           /* Ativa rolagem horizontal */
    overflow-y: hidden;         /* Trava rolagem vertical */
    gap: 12px;                  /* Espaço perfeito entre os módulos */
    padding: 5px 15px;          /* Padding que cria o respiro nas pontas da tela */
    width: 100%;                /* Ocupa exatamente a largura do pai */
    box-sizing: border-box;
    -webkit-overflow-scrolling: touch; /* Rolagem macia no Android */
}

/* Esconde a barra de rolagem feia do navegador */
.controles-rodape::-webkit-scrollbar {
    display: none;
}

/* 🛠️ ENGENHARIA DOS MÓDULOS (Bordas individuais inseridas aqui) */
.seletor-carrossel, 
.controle-quantidade-novo, 
.btn-finalizar-rodape {
    flex: 0 0 auto;             /* IMPEDE o navegador de esmagar as pontas (Conserta a seta oculta) */
    width: %;                 /* 🔥 MÁGICA DO CORTE: mostra dois módulos e deixa o 3º cortado avisando que rola */
    height: 50px;               /* Alinha a altura de todo mundo igualmente */
    box-sizing: border-box;
    
    /* Borda individual solicitada para isolar cada bloco */
    border: 2px solid rgba(241, 196, 15, 0.4); /* Borda dourada sutil */
    border-radius: 6px;         /* Cantos levemente arredondados modernos */
}

/* SELETORES EM FORMATO DE CARROSSEL ◀ [ TEXTO ] ▶ */

                divControleVisor.appendChild(titulo);
                // =================================================================

                // VISOR DE IMAGENS (MATEMÁTICA DAS COLUNAS MANTIDA)
                const divImagens = document.createElement('div');
                divImagens.className = 'imagens-progresso';

                const colunas = 7; 
                const imagensDaLinha = bancoImagens[linha];

                for (let i = 0; i < qtdAtual; i++) {
						
                    const boxquadro = document.createElement('div');
                    boxquadro.className = 'box-quadro';

                    const linhaAtual = Math.floor(i / colunas);
                    const colunaAtual = i % colunas;

                    let srcImagem = "";
                    let ehVazio = false;

                    if (estiloAtivo === "A") {
                        srcImagem = imagensDaLinha.zero;
                    } 
                    else if (estiloAtivo === "B") {
                        if ((linhaAtual + colunaAtual) % 2 === 0) {
                            ehVazio = true;
                        } else {
                            srcImagem = imagensDaLinha.zero;
                        }
                    } 
                    else if (estiloAtivo === "C") {
                        srcImagem = (i % 2 === 0) ? imagensDaLinha.zero : (imagensDaLinha.um || imagensDaLinha.zero);
                    }

                    if (linha === "Efeito 3D" && !ehVazio) {
                        boxquadro.classList.add('efeito3d');
                    }

                    if (ehVazio) {
                        boxquadro.style.background = "transparent";
                        boxquadro.style.cursor = "default";
                    } else {
                        const img = document.createElement("img");
                        img.src = srcImagem;
                        boxquadro.appendChild(img);
                        boxquadro.onclick = function(e) {
                            e.stopPropagation();
                            abrirModal(linha, srcImagem);
                        };
                    }

                    divImagens.appendChild(boxquadro);
                }
								
                divControleVisor.appendChild(divImagens);
                divLinha.appendChild(divControleVisor);
                painel.appendChild(divLinha);
            });

            // Re-mapeia os elementos no radar caso a estrutura mude
            if (radarInicializado) {
                revinculasElementosAoRadar();
            }
        }

        // 📡 RADARES E SENSORS DE INTERSEÇÃO (A LÓGICA DO MEIO DA TELA)
        let radarDeProdutos;

        function inicializarRadar() {
            const opcoesRadar = {
                root: null,
                rootMargin: "0% 80px -80% 0px", // Pega exatamente a faixa central do visor
                threshold: 0
            };

            radarDeProdutos = new IntersectionObserver((entradas) => {
                entradas.forEach(entrada => {
                    if (entrada.isIntersecting) {
                        categoriaAtiva = entrada.target.getAttribute('data-categoria');
                        
                        // Alimenta o painel fixo do rodapé com as informações corretas do produto ativo
                        document.getElementById('produto-ativo-label').innerText = `Controlando: ${categoriaAtiva}`;
                        document.getElementById('tipo-rodape').value = estilosPorLinha[categoriaAtiva] || "A";
                        document.getElementById('qtd-rodape-label').innerText = quantidadesPorLinha[categoriaAtiva] || 0;
                    }
                });
            }, opcoesRadar);

            radarInicializado = true;
            revinculasElementosAoRadar();
        }

        function revinculasElementosAoRadar() {
            document.querySelectorAll('.linha-produto').forEach(linha => {
                radarDeProdutos.observe(linha);
            });
        }

        // 🔄 FUNÇÕES DE CONTROLE MESTRE DO RODAPÉ FIXO
        function alterarQuantidadeAtiva(fator) {
            if (!categoriaAtiva) return;
            
            let qtd = (quantidadesPorLinha[categoriaAtiva] || 0) + fator;
            if (qtd < 0) qtd = 0;
            if (qtd > 20) qtd = 20; 

            quantidadesPorLinha[categoriaAtiva] = qtd;
            
            // Sincroniza o número na etiqueta do rodapé antes de re-renderizar tudo
            document.getElementById('qtd-rodape-label').innerText = qtd;
            
            renderizarGrid(); 
        }

        function mudarTipoAtivo(novoTipo) {
            if (!categoriaAtiva) return;
            estilosPorLinha[categoriaAtiva] = novoTipo;
            renderizarGrid();
        }

        // MODAL DO CARRINHO (FINALIZAR PEDIDO)
        function abrirCarrinhoModal() {
            const tbody = document.getElementById('itensCarrinho');
            const totalBox = document.getElementById('totalCarrinho');
            tbody.innerHTML = '';

            let totalGeral = 0;
            let temItens = false;

            Object.keys(quantidadesPorLinha).forEach(linha => {
                const qtd = quantidadesPorLinha[linha];
                if (qtd > 0) {
                    temItens = true;
                    const subtotal = qtd * PRECO_UNITARIO;
                    totalGeral += subtotal;

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><b>${linha} (${nomesEstilos[estilosPorLinha[linha]]})</b></td>
                        <td>R$ ${subtotal},00</td>
                        <td>${qtd}</td>
                    `;
                    tbody.appendChild(tr);
                }
            });

            if (!temItens) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#999; padding: 10px;">Seu carrinho está vazio. Adicione itens antes de finalizar!</td></tr>`;
            }

            totalBox.innerText = `TOTAL: R$ ${totalGeral},00`;
            document.getElementById('modalCarrinho').style.display = 'flex';
        }

        function fecharCarrinhoModal() {
            document.getElementById('modalCarrinho').style.display = 'none';
        }

        // MODAL DE DETALHES DE UMA IMAGEM CLICADA
        function abrirModal(categoria, imagemSrc) {
            document.getElementById('modalTitulo').innerText = "Quadro Modelo: " + categoria;
            document.getElementById('modalImg').src = imagemSrc;
            document.getElementById('modalTxtPreco').innerHTML = `<b>Valor Unitário:</b> R$ ${PRECO_UNITARIO},00`;
            document.getElementById('modalDetalhes').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalDetalhes').style.display = 'none';
        }

        function enviarPedidoFaturamento() {
            alert('Pedido enviado com sucesso para o faturamento!');
            fecharCarrinhoModal();
        }
    </script>
